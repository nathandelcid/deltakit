# Linting configuration for deltakit_explorer.
#
# General and format configurations are repository-wide for the moment.
extend = "../ruff.toml"
include = ["src/deltakit_explorer/**/*.py", "tests/**/*.py"]

[lint]
ignore = [
    "B",       # many manual adjustments required
    "E501",    # line length > 88 (fix later)
    "N",       # manual adjustment required
    "PLR2004", # magic values, especially in tests
    "PLR0912",
    "PLR0913",
    "PLR0915", # too many branches, arguments, statements
    "PLW1641", # Object does not implement `__hash__` method (fix later)
    "PLW2901", # Outer `for` loop variable `i` overwritten (fix later)
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"__init__.py" = ["F401"]
# Comments are using unicode symbol for sigma for better readability, but it looks like
# "o" and this rule raises a warning due to that.
"src/deltakit_explorer/analysis/_lambda.py" = ["RUF003"]
# Uses variables named "l", which is ambiguous and triggers that rule. The literature
# is using the letter "l", and ideally we want to stick to the literature, so we
# silence the warning for these two files.
"src/deltakit_explorer/codes/_bivariate_bicycle_code.py" = ["E741"]
"tests/unit/codes/test_bivariate_bicycle_code.py" = ["E741"]

"tests/**/*.py" = [
    # Temporary ignore.
    "RUF043",
]
